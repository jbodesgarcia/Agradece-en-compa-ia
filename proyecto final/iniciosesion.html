<!DOCTYPE html>
<html lang="en">
    <head>

        <title>Inicio sesion</title>
        <link rel="stylesheet" href="estilo.css">
    </head>
    <body>
        <header>
            <h1>Inicio de sesion</h1>
        </header>

        <main>
            <!--Aquí le decimos que el form enviará por POST los datos a iniciosesion.php-->
            <form action="iniciosesion.php" method="POST">
                <p>Numero del puesto</p>
                <!--el numero del puesto se enviará con el nombre nPuesto-->
                <input class="nPuesto" type="text" placeholder="numero puesto" name="nPuesto">
                <p>Contraseña</p>
                <!--contraseña se enviará con el nombre pw-->
                <input class="pw" type="password" placeholder="contraseña" name="pw">
                <br>
                <input type="submit">
            </form>
        </main>

        <footer>
            <img src="logoJesuitas.png" class="imagen">

        </footer>
